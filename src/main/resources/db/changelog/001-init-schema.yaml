databaseChangeLog:
  - changeSet:
      id: 001-create-schema
      author: codex
      changes:
        - createTable:
            tableName: app_role
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  startWith: 100
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  startWith: 100
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
        - createTable:
            tableName: user_role
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_role
            columnNames: user_id, role_id
            constraintName: pk_user_role
        - addForeignKeyConstraint:
            baseTableName: user_role
            baseColumnNames: user_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_user_role_user
        - addForeignKeyConstraint:
            baseTableName: user_role
            baseColumnNames: role_id
            referencedTableName: app_role
            referencedColumnNames: id
            constraintName: fk_user_role_role
        - createTable:
            tableName: project
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  startWith: 100
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: project
            baseColumnNames: owner_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_project_owner
        - createTable:
            tableName: task_list
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  startWith: 100
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(150)
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: task_list
            baseColumnNames: project_id
            referencedTableName: project
            referencedColumnNames: id
            constraintName: fk_task_list_project
        - createTable:
            tableName: tag
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  startWith: 100
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(80)
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: tag
            baseColumnNames: owner_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_tag_owner
        - addUniqueConstraint:
            tableName: tag
            columnNames: owner_id, name
            constraintName: uk_tag_owner_name
        - createTable:
            tableName: task
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  startWith: 100
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(160)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2000)
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: DATE
              - column:
                  name: assignee_id
                  type: BIGINT
              - column:
                  name: task_list_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: task
            baseColumnNames: assignee_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_task_assignee
        - addForeignKeyConstraint:
            baseTableName: task
            baseColumnNames: task_list_id
            referencedTableName: task_list
            referencedColumnNames: id
            constraintName: fk_task_task_list
        - createTable:
            tableName: task_tag
            columns:
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: task_tag
            columnNames: task_id, tag_id
            constraintName: pk_task_tag
        - addForeignKeyConstraint:
            baseTableName: task_tag
            baseColumnNames: task_id
            referencedTableName: task
            referencedColumnNames: id
            constraintName: fk_task_tag_task
        - addForeignKeyConstraint:
            baseTableName: task_tag
            baseColumnNames: tag_id
            referencedTableName: tag
            referencedColumnNames: id
            constraintName: fk_task_tag_tag
        - createTable:
            tableName: comment
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  startWith: 100
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: text
                  type: VARCHAR(2000)
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: comment
            baseColumnNames: author_id
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_comment_author
        - addForeignKeyConstraint:
            baseTableName: comment
            baseColumnNames: task_id
            referencedTableName: task
            referencedColumnNames: id
            constraintName: fk_comment_task
        - createTable:
            tableName: reminder
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  startWith: 100
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: remind_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: reminder
            baseColumnNames: task_id
            referencedTableName: task
            referencedColumnNames: id
            constraintName: fk_reminder_task
        - addForeignKeyConstraint:
            baseTableName: reminder
            baseColumnNames: created_by
            referencedTableName: app_user
            referencedColumnNames: id
            constraintName: fk_reminder_creator
