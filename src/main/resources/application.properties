spring.application.name=todo-lab

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/todo_lab}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

info.app.name=Todo Lab
info.app.description=REST service for managing projects, lists, tasks, tags, comments and reminders
info.app.version=0.0.1-SNAPSHOT
